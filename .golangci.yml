version: "2"

run:
  go: "1.25.3"
  timeout: 10m

formatters:
  enable:
    - gofmt
    - goimports

linters:
  default: all
  disable:
    # Global variables are used in many places throughout the code base.
    - gochecknoglobals

    # We want to allow short variable names.
    - varnamelen

    # We want to allow TODOs.
    - godox

    # Instances of table driven tests that don't pre-allocate shouldn't trigger
    # the linter.
    - prealloc

    # Init functions are used by loggers throughout the codebase.
    - gochecknoinits

    # Disable whitespace linter as it has conflict rules against our
    # contribution guidelines.
    - wsl
    - wsl_v5
    - whitespace

    # Allow using default empty values.
    - exhaustruct

    # Allow exiting case select faster by putting everything in default.
    - exhaustive

    # Allow tests to be put in the same package.
    - testpackage

    # Don't run the cognitive related linters.
    - gocognit
    - gocyclo
    - maintidx
    - cyclop

    # Allow customized interfaces to be returned from functions.
    - ireturn

    # Disable too many blank identifiers check.
    - dogsled

    # We don't wrap errors.
    - wrapcheck

    # Allow dynamic errors.
    - err113

    # We use ErrXXX instead.
    - errname

    # Disable nil check to allow returning multiple nil values.
    - nilnil

    # We often split tests into separate test functions.
    - thelper

    # The linter is too aggressive and doesn't add much value.
    - mnd

    # Some of the tests cannot be parallelized.
    - paralleltest

    # New linters that we haven't had time to address yet.
    - testifylint
    - perfsprint
    - inamedparam
    - copyloopvar
    - tagalign
    - protogetter
    - revive
    - depguard
    - gosmopolitan
    - intrange
    - goconst

    # Line length is handled by code review.
    - lll

    # bodyclose often false positives for methods returning responses.
    - bodyclose

    # musttag is too strict for initial development.
    - musttag

    # Allow files without nolint justifications.
    - nolintlint

    # Allow fmt.Print in CLI code.
    - forbidigo

    # Allow replace directives in go.mod (needed for lnd protobuf).
    - gomoddirectives

    # Function ordering is not critical.
    - funcorder

    # Inline error handling is idiomatic in this codebase.
    - noinlineerr

    # Context-free net.Listen/db.Exec is acceptable for CLI tools.
    - noctx

    # We explicitly discard json.Encode errors with _ =.
    - errchkjson

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - funlen
          - revive
          - dupl

      - path: mock*
        linters:
          - revive
          - forcetypeassert

      - path: test*
        linters:
          - gosec
          - funlen

      - path: cmd/.*/main\.go
        linters:
          - forbidigo

  settings:
    errorlint:
      errorf: true

    tagliatelle:
      case:
        rules:
          json: snake
          yaml: snake

    whitespace:
      multi-func: true
      multi-if: true

    gosec:
      excludes:
        - G402
        - G306
        - G601
        - G115
        - G304
        - G704

    staticcheck:
      checks:
        - "-SA1019"

    funlen:
      lines: 200
      statements: 80

    dupl:
      threshold: 200

    nestif:
      min-complexity: 10

    nlreturn:
      block-size: 3

    lll:
      line-length: 80
      tab-width: 8

